<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點餐統計系統</title>
<style>
  :root {
    --primary: #c0392b;
    --primary-light: #e74c3c;
    --primary-bg: #fdf2f2;
    --accent: #f39c12;
    --green: #27ae60;
    --bg: #faf8f5;
    --card: #ffffff;
    --border: #e8e0d5;
    --text: #2c2416;
    --text-muted: #8b7355;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .site-header {
    background: var(--primary); color: white;
    padding: 1rem 1.2rem; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .site-header h1 { font-size: 1.1rem; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .header-user { font-size: 0.82rem; opacity: 0.9; }
  .btn-header {
    background: rgba(255,255,255,0.18); color: white;
    border: 1px solid rgba(255,255,255,0.35); border-radius: 6px;
    padding: 4px 10px; font-size: 0.78rem; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn-header:hover { background: rgba(255,255,255,0.28); }
  .btn-header.admin-active { background: var(--accent); border-color: var(--accent); }

  /* SCREENS */
  .screen { display: none; padding: 1.2rem; max-width: 700px; margin: 0 auto; }
  .screen.active { display: block; }

  /* LANDING */
  .landing-card {
    background: var(--card); border-radius: var(--radius);
    padding: 2rem; box-shadow: var(--shadow); border: 1px solid var(--border);
    text-align: center; margin-top: 1.5rem;
  }
  .landing-icon { font-size: 3rem; margin-bottom: 0.6rem; }
  .landing-card h2 { font-size: 1.3rem; color: var(--primary); margin-bottom: 0.3rem; }
  .landing-card p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.2rem; }
  .select-wrap { position: relative; margin-bottom: 0.8rem; }
  .select-wrap select {
    width: 100%; padding: 0.7rem 1rem; border: 2px solid var(--border);
    border-radius: var(--radius-sm); font-size: 1rem; font-family: inherit;
    background: white; color: var(--text); appearance: none; cursor: pointer;
  }
  .select-wrap::after {
    content: '▾'; position: absolute; right: 1rem; top: 50%;
    transform: translateY(-50%); color: var(--text-muted); pointer-events: none;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    padding: 0.65rem 1.2rem; border-radius: var(--radius-sm);
    border: none; cursor: pointer; font-size: 0.9rem; font-family: inherit;
    font-weight: 500; transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: white; width: 100%; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); width: 100%; margin-top: 0.5rem; }
  .btn-outline:hover { background: var(--bg); }
  .btn-green { background: var(--green); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-danger { background: #fdecea; color: var(--primary); border: 1px solid #f5c6c6; }
  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; border-radius: 6px; }

  /* TABS */
  .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.2rem; }
  .tab-btn {
    flex: 1; padding: 0.75rem; border: none; background: transparent;
    font-size: 0.88rem; font-family: inherit; cursor: pointer;
    color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.15s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* SECTION */
  .section-title {
    font-size: 0.95rem; font-weight: 700; color: var(--primary);
    margin-bottom: 0.8rem; display: flex; align-items: center; gap: 7px;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }

  /* RESTAURANT CARDS */
  .restaurants-grid { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.2rem; }
  .restaurant-card {
    background: var(--card); border-radius: var(--radius);
    border: 2px solid var(--border); padding: 1rem;
    cursor: pointer; transition: all 0.15s; position: relative;
  }
  .restaurant-card.selected { border-color: var(--primary); background: var(--primary-bg); }
  .restaurant-card.full { opacity: 0.55; cursor: not-allowed; border-color: #ddd; background: #f9f9f9; }
  .full-badge { display: inline-block; background: #e74c3c; color: white; font-size: 0.72rem; border-radius: 4px; padding: 1px 7px; margin-left: 6px; font-weight: 600; }
  .capacity-bar { margin-top: 0.5rem; margin-left: 25px; }
  .capacity-text { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 3px; }
  .capacity-track { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
  .capacity-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .restaurant-name { font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; gap: 7px; margin-bottom: 0.25rem; }
  .radio-circle {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border); background: white;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .restaurant-card.selected .radio-circle { background: var(--primary); border-color: var(--primary); }
  .radio-circle::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: white; display: none; }
  .restaurant-card.selected .radio-circle::after { display: block; }
  .restaurant-note { font-size: 0.8rem; color: var(--text-muted); margin-left: 25px; }
  .restaurant-img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 6px; margin-top: 0.6rem; background: #f5f5f0; }
  .no-img { background: #f5f5f0; border-radius: 6px; padding: 1.2rem; text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 0.6rem; }
  .admin-edit-bar { display: flex; gap: 6px; margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px dashed var(--border); }

  /* SUMMARY */
  .summary-box { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1rem; margin-bottom: 0.8rem; }
  .restaurant-group { margin-bottom: 0.8rem; }
  .restaurant-group-name { font-weight: 500; color: var(--primary); font-size: 0.88rem; margin-bottom: 0.4rem; }
  .people-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .person-tag {
    background: var(--primary-bg); color: var(--primary);
    border-radius: 20px; padding: 3px 10px; font-size: 0.78rem;
    border: 1px solid #f5c6c6; display: inline-flex; align-items: center; gap: 4px;
  }
  .del-btn {
    background: none; border: none; cursor: pointer; color: var(--primary);
    font-size: 0.75rem; padding: 0; line-height: 1; font-weight: 700;
    opacity: 0.6;
  }
  .del-btn:hover { opacity: 1; }
  .no-data { color: var(--text-muted); font-size: 0.85rem; }

  /* MENU */
  .menu-category { margin-bottom: 1.2rem; }
  .category-title {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 1px;
    color: var(--text-muted); padding: 0.35rem 0;
    border-bottom: 1px solid var(--border); margin-bottom: 0.6rem;
  }
  .menu-item { display: flex; align-items: center; gap: 8px; padding: 0.5rem 0; border-bottom: 1px solid #f0ebe3; }
  .menu-item-name { flex: 1; font-size: 0.88rem; }
  .menu-item-price { font-size: 0.78rem; color: var(--text-muted); min-width: 34px; }
  .qty-control { display: flex; align-items: center; gap: 5px; }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--border); background: white;
    cursor: pointer; font-size: 1rem; display: flex; align-items: center;
    justify-content: center; color: var(--primary); font-weight: 700; transition: all 0.12s;
  }
  .qty-btn:hover { background: var(--primary-bg); border-color: var(--primary); }
  .qty-display { font-size: 0.9rem; font-weight: 500; min-width: 16px; text-align: center; }
  .order-note-input {
    width: 100%; border: 1px solid var(--border); border-radius: 6px;
    padding: 0.55rem 0.8rem; font-size: 0.85rem; font-family: inherit;
    margin-top: 0.6rem; resize: vertical;
  }

  /* ORDER PERSON CARD */
  .order-person-card { background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
  .order-person-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
  .order-person-name { font-weight: 500; color: var(--primary); font-size: 0.88rem; }
  .order-item-line { font-size: 0.8rem; color: var(--text-muted); }
  .order-total-line { font-size: 0.82rem; font-weight: 500; color: var(--primary); margin-top: 3px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 500;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: var(--radius); padding: 1.4rem;
    max-width: 420px; width: 92%; max-height: 85vh; overflow-y: auto;
  }
  .modal h3 { margin-bottom: 0.9rem; color: var(--primary); font-size: 1rem; }
  .modal input, .modal textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 0.55rem 0.8rem; font-size: 0.88rem; font-family: inherit; margin-bottom: 0.5rem;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.8rem; }
  .btn-cancel { background: #f0ebe3; color: var(--text-muted); border: none; }
  .name-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.45rem 0; border-bottom: 1px solid #f0ebe3; font-size: 0.85rem; gap: 6px;
  }
  .name-edit-input { border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font-size: 0.82rem; flex: 1; max-width: 160px; }

  /* ADMIN BADGE in header */
  .admin-banner {
    background: #fff3cd; border-bottom: 2px solid var(--accent);
    padding: 0.5rem 1.2rem; font-size: 0.82rem; color: #856404;
    display: flex; align-items: center; justify-content: space-between;
    font-family: inherit;
  }

  /* LIVE */
  .live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--green); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TOAST */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #2c2416; color: white; padding: 0.65rem 1.3rem;
    border-radius: 30px; font-size: 0.85rem; z-index: 1000;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .submit-row { margin-top: 1rem; }
  .section-label { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.3rem; display: block; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="site-header">
  <h1>🍱 點餐統計系統</h1>
  <div class="header-right">
    <span class="header-user" id="headerUser"></span>
    <button class="btn-header" id="orderAdminBtn" style="display:none;" onclick="openOrderAdminModal()">管理員 🔑</button>
    <button class="btn-header" id="backBtn" style="display:none;" onclick="goHome()">換人</button>
  </div>
</div>

<!-- ADMIN BANNER (shown in order screen when admin logged in) -->
<div class="admin-banner" id="adminBanner" style="display:none;">
  ⚙️ 管理員模式：可刪除訂單、編輯餐廳
  <button class="btn btn-sm btn-danger" onclick="exitAdminMode()">離開管理</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===== SCREEN: LANDING ===== -->
<div class="screen active" id="screenLanding">
  <div class="landing-card">
    <div class="landing-icon">🍜</div>
    <h2>歡迎！請選擇您的名字</h2>
    <p>選擇後進入點餐畫面，可為 5/2 午餐與 5/3 午餐分別登記</p>
    <div class="select-wrap">
      <select id="nameSelect">
        <option value="">— 請選擇姓名 —</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="enterOrder()">進入點餐 →</button>
    <button class="btn btn-outline" onclick="openLandingAdminModal()">管理員設定 🔑</button>
  </div>
</div>

<!-- ===== SCREEN: ORDER ===== -->
<div class="screen" id="screenOrder">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem;">
    <span id="syncStatus" style="font-size:0.75rem;font-family:inherit;"></span>
    <button onclick="loadFromGAS().then(refreshUI)" style="font-size:0.72rem;background:none;border:1px solid var(--border);border-radius:5px;padding:2px 8px;cursor:pointer;color:var(--text-muted);">🔄 手動同步</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('meal1',this)">🍱 5/2（六）午餐</button>
    <button class="tab-btn" onclick="switchTab('meal2',this)">🥢 5/3（日）午餐</button>
  </div>

  <!-- MEAL 1 -->
  <div class="tab-content active" id="meal1">
    <div class="section-title">📍 請選擇 5/2（六）午餐餐廳</div>
    <div class="restaurants-grid" id="restaurantsGrid"></div>
    <div class="submit-row">
      <button class="btn btn-primary" onclick="submitMeal1()">確認送出 5/2 選擇</button>
    </div>
    <hr class="divider">
    <div class="section-title">
      📊 即時統計
      <span class="live-badge"><span class="live-dot"></span>即時</span>
    </div>
    <div id="meal1Summary"></div>
  </div>

  <!-- MEAL 2 -->
  <div class="tab-content" id="meal2">
    <div class="section-title">🥢 5/3（日）午餐 — 素食越南料理</div>
    <div id="menuGrid"></div>
    <label class="section-label" style="margin-top:0.8rem;">備註（過敏、特殊需求等）</label>
    <textarea class="order-note-input" id="meal2Note" rows="2" placeholder="如有備註請填寫…"></textarea>
    <div class="submit-row">
      <button class="btn btn-primary" onclick="submitMeal2()">確認送出 5/3 點餐</button>
    </div>
    <hr class="divider">
    <div class="section-title">
      📊 即時點餐總覽
      <span class="live-badge"><span class="live-dot"></span>即時</span>
    </div>
    <div id="meal2Summary"></div>
  </div>
</div>

<!-- ===== MODAL: 登入畫面管理員（名單管理） ===== -->
<div class="modal-overlay" id="modalLandingAdmin">
  <div class="modal">
    <h3>🔑 管理員登入</h3>
    <input type="password" id="landingAdminPw" placeholder="請輸入密碼" onkeyup="if(event.key==='Enter')checkLandingAdminPw()">
    <div class="modal-actions">
      <button class="btn btn-cancel btn-sm" onclick="closeModal('modalLandingAdmin')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="checkLandingAdminPw()">確認</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 登入畫面管理員面板（名單管理） ===== -->
<div class="modal-overlay" id="modalNamePanel">
  <div class="modal" style="max-width:460px;">
    <h3>👥 成員名單管理</h3>
    <div id="adminNameList"></div>
    <div style="display:flex;gap:6px;margin-top:0.6rem;">
      <input id="newNameInput" placeholder="新增姓名" style="flex:1;">
      <button class="btn btn-green btn-sm" onclick="addName()">新增</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary btn-sm" onclick="closeModal('modalNamePanel')">完成</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 點餐畫面管理員登入 ===== -->
<div class="modal-overlay" id="modalOrderAdmin">
  <div class="modal">
    <h3>🔑 管理員登入</h3>
    <input type="password" id="orderAdminPw" placeholder="請輸入密碼" onkeyup="if(event.key==='Enter')checkOrderAdminPw()">
    <div class="modal-actions">
      <button class="btn btn-cancel btn-sm" onclick="closeModal('modalOrderAdmin')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="checkOrderAdminPw()">確認</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 點餐畫面管理員面板（訂單+餐廳管理） ===== -->
<div class="modal-overlay" id="modalOrderPanel">
  <div class="modal" style="max-width:460px;">
    <h3>⚙️ 訂單管理</h3>

    <div style="font-size:0.85rem;font-weight:600;color:var(--primary);margin-bottom:0.5rem;">🍱 5/2 午餐訂單</div>
    <div id="adminMeal1Orders"></div>

    <hr class="divider">
    <div style="font-size:0.85rem;font-weight:600;color:var(--primary);margin-bottom:0.5rem;">🥢 5/3 午餐訂單</div>
    <div id="adminMeal2Orders"></div>

    <hr class="divider">
    <div style="font-size:0.85rem;font-weight:600;color:var(--primary);margin-bottom:0.5rem;">🏪 5/2 餐廳設定</div>
    <div id="restaurantAdminList"></div>

    <hr class="divider">
    <button class="btn btn-accent btn-sm" onclick="exportCSV()">⬇ 下載 CSV（可貼入試算表）</button>

    <div class="modal-actions">
      <button class="btn btn-primary btn-sm" onclick="closeModal('modalOrderPanel')">完成</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 餐廳編輯 ===== -->
<div class="modal-overlay" id="modalRestEdit">
  <div class="modal">
    <h3 id="restEditTitle">編輯餐廳</h3>
    <label class="section-label">餐廳名稱</label>
    <input id="restNameInput" placeholder="餐廳名稱">
    <label class="section-label">備註說明</label>
    <textarea id="restNoteInput" rows="3" placeholder="菜單備註、特色說明等…" style="resize:vertical;"></textarea>
    <label class="section-label">上傳菜單圖片</label>
    <input type="file" id="restImgInput" accept="image/*" style="font-size:0.85rem;margin-bottom:0.5rem;">
    <div class="modal-actions">
      <button class="btn btn-cancel btn-sm" onclick="closeModal('modalRestEdit')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveRestaurant()">儲存</button>
    </div>
  </div>
</div>

<script>
// ========== CONSTANTS ==========

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function getNames() { return load('names', defaultNames); }
function saveNames(n) { save('names', n); }
function getRestaurants() {
  const defaults = [
    { name: '福圓素食', note: '有自助餐、湯/乾麵　座位約10人左右', imgData: IMG0 },
    { name: '天佑素食', note: '請參考圖片　座位約5~6人', imgData: IMG1 },
    { name: '清原素食', note: '中式早餐類型　座位約6~8位左右', imgData: IMG2 },
  ];
  const saved = load('restaurants', null);
  if (!saved) return defaults;
  return defaults.map((def, i) => {
    const s = saved[i] || {};
    return {
      name: s.name || def.name,
      note: s.note !== undefined ? s.note : def.note,
      imgData: s.imgData || def.imgData,
    };
  });
}
function saveRestaurants(r) { save('restaurants', r); }

function saveQty(q) { save('qty_' + currentUser, q); }

// ========== SYNC ==========
let isSyncing = false;

function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status === 'syncing') { el.textContent = '⏳ 同步中…'; el.style.color = '#f39c12'; }
  else if (status === 'ok') {
    const now = new Date();
    const t = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
    el.textContent = '✅ 已同步 ' + t;
    el.style.color = '#27ae60';
  }
  else { el.textContent = '⚠️ 同步失敗'; el.style.color = '#e74c3c'; }
}

async function loadFromGAS() {
  try {
    setSyncStatus('syncing');
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    const data = await res.json();
    if (data.meal1) save('meal1Orders', data.meal1);
    if (data.meal2) save('meal2Orders', data.meal2);
    if (data.names) save('names', data.names);
    // restaurants: only sync name+note (not images)
    if (data.restaurants) {
      const local = load('restaurants', null);
      const merged = data.restaurants.map((r, i) => ({
        name: r.name,
        note: r.note,
        imgData: (local && local[i]) ? local[i].imgData : '',
      }));
      save('restaurants', merged);
    }
    setSyncStatus('ok');
    return true;
  } catch(e) {
    setSyncStatus('fail');
    return false;
  }
}

function syncToSheet() {
  const names = getNames();
  const meal1 = getMeal1Orders();
  const meal2 = getMeal2Orders();
  const restaurants = getRestaurants().map(r => ({ name: r.name, note: r.note }));
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ names, meal1, meal2, restaurants })
  }).then(() => {
    setTimeout(() => { loadFromGAS().then(refreshUI); }, 1500);
  }).catch(() => setSyncStatus('fail'));
  setSyncStatus('syncing');
}

function refreshUI() {
  populateNameSelect();
  renderRestaurantsGrid();
  renderMeal1Summary();
  renderMeal2Summary();
}

// ========== INIT ==========
async function init() {
  populateNameSelect();
  renderRestaurantsGrid();
  renderMenu();
  renderMeal1Summary();
  renderMeal2Summary();
  // Load from GAS then refresh UI
  const ok = await loadFromGAS();
  if (ok) refreshUI();
  // Poll every 30 seconds
  setInterval(async () => {
    const ok = await loadFromGAS();
    if (ok) refreshUI();
  }, 30000);
}

function populateNameSelect() {
  const sel = document.getElementById('nameSelect');
  const names = getNames();
  sel.innerHTML = '<option value="">— 請選擇姓名 —</option>';
  names.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    sel.appendChild(opt);
  });
}

// ========== NAVIGATION ==========
function enterOrder() {
  const sel = document.getElementById('nameSelect').value;
  if (!sel) { showToast('請先選擇您的名字 😊'); return; }
  currentUser = sel;
  document.getElementById('headerUser').textContent = sel;
  document.getElementById('orderAdminBtn').style.display = 'inline-block';
  document.getElementById('backBtn').style.display = 'inline-block';
  showScreen('screenOrder');
  renderRestaurantsGrid();
  renderMenu();
  renderMeal1Summary();
  renderMeal2Summary();
  // Restore qty
  const qty = getQty();
  qtyMap = qty;
  Object.keys(qty).forEach(k => {
    const el = document.getElementById('qty_' + k);
    if (el) el.textContent = qty[k];
  });
  // Restore meal1 selection
  const meal1 = getMeal1Orders();
  if (meal1[currentUser] !== undefined) {
    const target = document.querySelector(`.restaurant-card[data-idx="${meal1[currentUser]}"]`);
    if (target) target.classList.add('selected');
  }
  // Restore note
  const meal2 = getMeal2Orders();
  if (meal2[currentUser]) document.getElementById('meal2Note').value = meal2[currentUser].note || '';
}

function goHome() {
  exitAdminMode();
  currentUser = '';
  document.getElementById('headerUser').textContent = '';
  document.getElementById('orderAdminBtn').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  showScreen('screenLanding');
  populateNameSelect();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tab).classList.add('active');
  renderMeal1Summary();
  renderMeal2Summary();
}

// ========== ADMIN MODE (order screen) ==========
function openOrderAdminModal() {
  document.getElementById('orderAdminPw').value = '';
  openModal('modalOrderAdmin');
}

function checkOrderAdminPw() {
  if (document.getElementById('orderAdminPw').value === ADMIN_PW) {
    closeModal('modalOrderAdmin');
    enterAdminMode();
  } else {
    showToast('密碼錯誤 ❌');
  }
}

function enterAdminMode() {
  adminMode = true;
  document.getElementById('adminBanner').style.display = 'flex';
  document.getElementById('orderAdminBtn').classList.add('admin-active');
  renderMeal1Summary();
  renderMeal2Summary();
  renderRestaurantsGrid();
  // Open order panel
  renderAdminMeal1Orders();
  renderAdminMeal2Orders();
  renderRestaurantAdminList();
  openModal('modalOrderPanel');
}

function exitAdminMode() {
  adminMode = false;
  document.getElementById('adminBanner').style.display = 'none';
  document.getElementById('orderAdminBtn').classList.remove('admin-active');
  renderMeal1Summary();
  renderMeal2Summary();
  renderRestaurantsGrid();
}

// ========== ADMIN MODE (landing screen) ==========
function openLandingAdminModal() {
  document.getElementById('landingAdminPw').value = '';
  openModal('modalLandingAdmin');
}

function checkLandingAdminPw() {
  if (document.getElementById('landingAdminPw').value === ADMIN_PW) {
    closeModal('modalLandingAdmin');
    renderAdminNameList();
    openModal('modalNamePanel');
  } else {
    showToast('密碼錯誤 ❌');

// ========== NAME MANAGEMENT ==========
function renderAdminNameList() {
  const names = getNames();
  let html = '';
  names.forEach((n, i) => {
    html += `<div class="name-list-item">
      <input class="name-edit-input" id="nameEdit_${i}" value="${n}">
      <div style="display:flex;gap:5px;">
        <button class="btn btn-green btn-sm" onclick="saveName(${i})">儲存</button>
        <button class="btn btn-danger btn-sm" onclick="deleteName(${i})">刪除</button>
      </div>
    </div>`;
  });
  document.getElementById('adminNameList').innerHTML = html;
}

function saveName(i) {
  const names = getNames();
  const val = document.getElementById('nameEdit_' + i).value.trim();
  if (!val) return;
  names[i] = val; saveNames(names);
  populateNameSelect(); renderAdminNameList();
  showToast('已更新 ✅');
}

function deleteName(i) {
  const names = getNames();
  names.splice(i, 1); saveNames(names);
  populateNameSelect(); renderAdminNameList();
  showToast('已刪除 ✅');
}

function addName() {
  const val = document.getElementById('newNameInput').value.trim();
  if (!val) return;
  const names = getNames(); names.push(val); saveNames(names);
  populateNameSelect(); renderAdminNameList();
  document.getElementById('newNameInput').value = '';
  showToast('已新增 ✅');
}

// ========== ORDER ADMIN PANEL ==========
function renderAdminMeal1Orders() {
  const el = document.getElementById('adminMeal1Orders');
  if (!el) return;
  const orders = getMeal1Orders();
  const restaurants = getRestaurants();
  if (Object.keys(orders).length === 0) {
    el.innerHTML = '<div class="no-data" style="font-size:0.82rem;padding:0.4rem 0;">尚無人登記</div>';
    return;
  }
  let html = '';
  Object.entries(orders).forEach(([name, idx]) => {
    const rname = restaurants[idx] ? restaurants[idx].name : '(已刪除)';
    html += `<div class="name-list-item">
      <span>${name} <span style="color:var(--text-muted);font-size:0.78rem;">— ${rname}</span></span>
      <button class="btn btn-danger btn-sm" onclick="deleteMeal1Order('${name}')">刪除</button>
    </div>`;
  });
  el.innerHTML = html;
}

function renderAdminMeal2Orders() {
  const el = document.getElementById('adminMeal2Orders');
  if (!el) return;
  const orders = getMeal2Orders();
  if (Object.keys(orders).length === 0) {
    el.innerHTML = '<div class="no-data" style="font-size:0.82rem;padding:0.4rem 0;">尚無人登記</div>';
    return;
  }
  let html = '';
  Object.entries(orders).forEach(([name, order]) => {
    const total = order.items.reduce((s, i) => s + i.price * i.qty, 0);
    const detail = order.items.map(i => `${i.name}×${i.qty}`).join('、');
    html += `<div class="name-list-item" style="flex-direction:column;align-items:flex-start;gap:3px;">
      <div style="display:flex;width:100%;justify-content:space-between;align-items:center;">
        <span style="font-weight:500;">${name} <span style="color:var(--primary);font-size:0.78rem;">${total}元</span></span>
        <button class="btn btn-danger btn-sm" onclick="deleteMeal2Order('${name}')">刪除</button>
      </div>
      <div style="font-size:0.78rem;color:var(--text-muted);">${detail}</div>
      ${order.note ? `<div style="font-size:0.78rem;color:var(--accent);">📝 ${order.note}</div>` : ''}
    </div>`;
  });
  el.innerHTML = html;
}

function deleteMeal1Order(name) {
  const orders = getMeal1Orders();
  delete orders[name]; saveMeal1Orders(orders);
  renderAdminMeal1Orders();
  renderMeal1Summary();
  syncToSheet();
  showToast(`已刪除 ${name} 的 5/2 選擇 ✅`);
}

function deleteMeal2Order(name) {
  const orders = getMeal2Orders();
  delete orders[name]; saveMeal2Orders(orders);
  renderAdminMeal2Orders();
  renderMeal2Summary();
  syncToSheet();
  showToast(`已刪除 ${name} 的 5/3 點餐 ✅`);
}

// ========== RESTAURANTS ==========
function getRestaurantCounts() {
  const orders = getMeal1Orders();
  const counts = [0, 0, 0];
  Object.entries(orders).forEach(([name, idx]) => {
    if (counts[idx] !== undefined) counts[idx]++;
  });
  return counts;
}

function renderRestaurantsGrid() {
  const grid = document.getElementById('restaurantsGrid');
  if (!grid) return;
  const restaurants = getRestaurants();
  const meal1 = getMeal1Orders();
  const selected = meal1[currentUser];
  const counts = getRestaurantCounts();
  grid.innerHTML = '';
  restaurants.forEach((r, i) => {
    const cap = CAPACITIES[i];
    const count = counts[i] || 0;
    const isFull = count >= cap && selected !== i;
    const card = document.createElement('div');
    let cls = 'restaurant-card';
    if (selected === i) cls += ' selected';
    else if (isFull) cls += ' full';
    card.className = cls;
    card.dataset.idx = i;
    card.onclick = () => { if (!isFull) selectRestaurant(i); };

    const pct = Math.min(100, Math.round(count / cap * 100));
    const barColor = pct >= 100 ? '#e74c3c' : pct >= 70 ? '#f39c12' : '#27ae60';
    const remaining = Math.max(0, cap - count);

    const imgHtml = r.imgData
      ? `<img src="${r.imgData}" class="restaurant-img" alt="菜單">`
      : `<div class="no-img">📷 菜單圖片尚未上傳</div>`;
    const adminBar = adminMode
      ? `<div class="admin-edit-bar">
          <button class="btn btn-sm btn-outline" style="width:auto;" onclick="event.stopPropagation();openRestEdit(${i})">✏️ 編輯餐廳</button>
         </div>` : '';

    card.innerHTML = `
      <div class="restaurant-name">
        <div class="radio-circle"></div>
        ${r.name}
        ${isFull ? '<span class="full-badge">人數已達上限</span>' : ''}
      </div>
      ${r.note ? `<div class="restaurant-note">${r.note}</div>` : ''}
      <div class="capacity-bar">
        <div class="capacity-text">
          已訂 ${count} 人 / 上限 ${cap} 人　
          <span style="color:${remaining===0?'#e74c3c':remaining<=2?'#f39c12':'#27ae60'};font-weight:500;">
            ${remaining === 0 ? '❌ 已額滿' : `剩餘 ${remaining} 位`}
          </span>
        </div>
        <div class="capacity-track">
          <div class="capacity-fill" style="width:${pct}%;background:${barColor};"></div>
        </div>
      </div>
      ${imgHtml}
      ${adminBar}`;
    grid.appendChild(card);
  });
}

function renderRestaurantAdminList() {
  const el = document.getElementById('restaurantAdminList');
  if (!el) return;
  const restaurants = getRestaurants();
  let html = '';
  restaurants.forEach((r, i) => {
    html += `<div class="name-list-item">
      <span>${r.name}</span>
      <button class="btn btn-sm btn-outline" style="width:auto;" onclick="openRestEdit(${i})">✏️ 編輯</button>
    </div>`;
  });
  el.innerHTML = html;
}

function selectRestaurant(idx) {
  const counts = getRestaurantCounts();
  const meal1 = getMeal1Orders();
  const currentSel = meal1[currentUser];
  const cap = CAPACITIES[idx];
  // Allow if user already selected this, or not full
  if (counts[idx] >= cap && currentSel !== idx) {
    showToast('此餐廳人數已達上限 ❌');
    return;
  }
  document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('selected'));
  const target = document.querySelector(`.restaurant-card[data-idx="${idx}"]`);
  if (target) target.classList.add('selected');
}

function submitMeal1() {
  const selected = document.querySelector('.restaurant-card.selected');
  if (!selected) { showToast('請先選擇一家餐廳 🍽️'); return; }
  const idx = parseInt(selected.dataset.idx);
  const orders = getMeal1Orders();
  orders[currentUser] = idx; saveMeal1Orders(orders);
  renderMeal1Summary();
  syncToSheet();
  showToast('✅ 5/2 餐廳選擇已儲存，同步中…');
}

function renderMeal1Summary() {
  const el = document.getElementById('meal1Summary');
  if (!el) return;
  const orders = getMeal1Orders();
  const restaurants = getRestaurants();
  const groups = {};
  // init all restaurants in order
  restaurants.forEach((r, i) => { groups[i] = { name: r.name, people: [] }; });
  Object.entries(orders).forEach(([name, idx]) => {
    if (groups[idx]) groups[idx].people.push(name);
  });
  const anyOrders = Object.values(groups).some(g => g.people.length > 0);
  if (!anyOrders) {
    el.innerHTML = '<div class="summary-box"><div class="no-data">尚無人登記 5/2 午餐</div></div>';
    return;
  }
  let html = '<div class="summary-box">';
  Object.entries(groups).forEach(([idxStr, g]) => {
    const idx = parseInt(idxStr);
    const cap = CAPACITIES[idx];
    const count = g.people.length;
    const remaining = Math.max(0, cap - count);
    const barColor = count >= cap ? '#e74c3c' : count >= cap * 0.7 ? '#f39c12' : '#27ae60';
    const pct = Math.min(100, Math.round(count / cap * 100));
    html += `<div class="restaurant-group">
      <div class="restaurant-group-name" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;">
        <span>🍴 ${g.name}</span>
        <span style="font-size:0.78rem;font-weight:400;color:var(--text-muted);">
          已訂 <strong style="color:var(--primary);">${count}</strong> / ${cap} 人　
          <span style="color:${remaining===0?'#e74c3c':remaining<=2?'#f39c12':'#27ae60'};">
            ${remaining === 0 ? '❌ 額滿' : `剩 ${remaining} 位`}
          </span>
        </span>
      </div>
      <div class="capacity-track" style="margin:5px 0 8px;">
        <div class="capacity-fill" style="width:${pct}%;background:${barColor};"></div>
      </div>
      <div class="people-list">`;
    if (g.people.length === 0) {
      html += `<span style="font-size:0.8rem;color:var(--text-muted);">尚無人選擇</span>`;
    } else {
      g.people.forEach(p => { html += `<span class="person-tag">${p}</span>`; });
    }
    html += '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// ========== MENU ==========
let qtyMap = {};

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  if (!grid) return;
  qtyMap = getQty();
  let html = '';
  let idx = 0;
  menuData.forEach(cat => {
    html += `<div class="menu-category"><div class="category-title">${cat.category}</div>`;
    cat.items.forEach(item => {
      const qty = qtyMap[item.name] || 0;
      html += `<div class="menu-item">
        <div class="menu-item-name">${item.name}</div>
        <div class="menu-item-price">${item.price}元</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
          <div class="qty-display" id="qty_${idx}">${qty}</div>
          <button class="qty-btn" onclick="changeQty(${idx},1)">＋</button>
        </div>
      </div>`;
      idx++;
    });
    html += '</div>';
  });
  grid.innerHTML = html;
}

// Flat list of all items for index lookup
const allMenuItems = menuData.flatMap(cat => cat.items);

function changeQty(idx, delta) {
  const item = allMenuItems[idx];
  if (!item) return;
  if (!qtyMap[item.name]) qtyMap[item.name] = 0;
  qtyMap[item.name] = Math.max(0, qtyMap[item.name] + delta);
  const el = document.getElementById('qty_' + idx);
  if (el) el.textContent = qtyMap[item.name];
  saveQty(qtyMap);
}

function submitMeal2() {
  const hasOrder = Object.values(qtyMap).some(v => v > 0);
  if (!hasOrder) { showToast('請先選擇至少一道餐點 🥢'); return; }
  const note = document.getElementById('meal2Note').value;
  const orders = getMeal2Orders();
  const items = [];
  menuData.forEach(cat => {
    cat.items.forEach(item => {
      const q = qtyMap[item.name] || 0;
      if (q > 0) items.push({ name: item.name, qty: q, price: item.price });
    });
  });
  orders[currentUser] = { items, note };
  saveMeal2Orders(orders);
  renderMeal2Summary();
  syncToSheet();
  showToast('✅ 5/3 點餐已儲存，同步中…');
}

function renderMeal2Summary() {
  const el = document.getElementById('meal2Summary');
  if (!el) return;
  const orders = getMeal2Orders();
  if (Object.keys(orders).length === 0) {
    el.innerHTML = '<div class="summary-box"><div class="no-data">尚無人登記 5/3 午餐</div></div>';
    return;
  }
  let html = '';
  Object.entries(orders).forEach(([name, order]) => {
    const total = order.items.reduce((s, i) => s + i.price * i.qty, 0);
    html += `<div class="order-person-card">
      <div class="order-person-header">
        <div class="order-person-name">${name}</div>
        <div class="order-total-line">合計 $${total}</div>
      </div>`;
    order.items.forEach(i => {
      html += `<div class="order-item-line">• ${i.name} × ${i.qty}　$${i.price * i.qty}</div>`;
    });
    if (order.note) html += `<div class="order-item-line" style="color:var(--accent);margin-top:2px;">📝 ${order.note}</div>`;
    html += '</div>';
  });
  el.innerHTML = html;
}

// ========== RESTAURANT EDIT ==========
function openRestEdit(idx) {
  editingRestIdx = idx;
  const r = getRestaurants()[idx];
  document.getElementById('restEditTitle').textContent = '編輯 ' + r.name;
  document.getElementById('restNameInput').value = r.name;
  document.getElementById('restNoteInput').value = r.note || '';
  document.getElementById('restImgInput').value = '';
  openModal('modalRestEdit');
}

function saveRestaurant() {
  const restaurants = getRestaurants();
  const name = document.getElementById('restNameInput').value.trim();
  const note = document.getElementById('restNoteInput').value.trim();
  const file = document.getElementById('restImgInput').files[0];
  function doSave(imgData) {
    if (name) restaurants[editingRestIdx].name = name;
    restaurants[editingRestIdx].note = note;
    if (imgData) restaurants[editingRestIdx].imgData = imgData;
    saveRestaurants(restaurants);
    renderRestaurantsGrid();
    renderRestaurantAdminList();
    closeModal('modalRestEdit');
    showToast('餐廳資料已更新 ✅');
  }
  if (file) {
    const reader = new FileReader();
    reader.onload = e => doSave(e.target.result);
    reader.readAsDataURL(file);
  } else { doSave(null); }
}

// ========== EXPORT ==========
function exportCSV() {
  const meal1 = getMeal1Orders();
  const meal2 = getMeal2Orders();
  const restaurants = getRestaurants();
  const names = getNames();
  let rows = [['姓名','5/2 午餐選擇','5/3 點餐明細','5/3 備註','5/3 合計']];
  names.forEach(name => {
    const r1idx = meal1[name];
    const r1 = r1idx !== undefined ? (restaurants[r1idx]?.name || '') : '';
    const o2 = meal2[name];
    const detail = o2 ? o2.items.map(i => `${i.name}×${i.qty}`).join('、') : '';
    const note2 = o2 ? (o2.note || '') : '';
    const total2 = o2 ? o2.items.reduce((s,i) => s + i.price*i.qty, 0) : '';
    rows.push([name, r1, detail, note2, total2]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = '點餐統計.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  showToast('CSV 已下載 ✅');
}

// ========== MODAL ==========
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ========== TOAST ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
